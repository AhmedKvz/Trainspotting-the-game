<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh}canvas{display:block}</style>
</head><body><canvas id="c"></canvas><script>
const CV=document.getElementById('c');
const W=CV.width=800,H=CV.height=500;
const cx=CV.getContext('2d');
const VY=132,NY=438,NS=0.83;
function prj(wx,wz){const t=1-Math.max(0,Math.min(1,wz));return{x:W/2+wx*t*NS,y:VY+t*(NY-VY),s:t};}
const W_WX=-312,W_HT=148,W_LN=0.21,W_GAP=0.05;

// ── CHARACTERS ─────────────────────────────────────────────
const CHARS=[
  {id:'charlie',name:'Charlie Sheen',   emoji:'🐯',
   desc:'WINNING — Kokain traje 2× duže',
   jCol:'#2c1f0a',jCol2:'#5a3a10',hair:'slick',hCol:'#080808',skin:'#d49060',
   anxRate:1.35,bonus:'cocaine',streak:'immune'},
  {id:'amy',    name:'Amy Winehouse',   emoji:'🎵',
   desc:'Back to Black — Heroin ne broji streak',
   jCol:'#1a0510',jCol2:'#30091c',hair:'beehive',hCol:'#0a0505',skin:'#c8a070',
   anxRate:0.7,bonus:'heroin',streak:'heroin_immune'},
  {id:'kabir',  name:'Kabir Biberovic', emoji:'🇧🇦',
   desc:'Lokalni šampion — Najsporija anksioznost',
   jCol:'#0a1e3c',jCol2:'#0d2a52',hair:'curly',hCol:'#1a0e05',skin:'#c09060',
   anxRate:0.55,bonus:'weed',streak:'none'},
  {id:'jesse',  name:'Jesse Pinkman',   emoji:'⚗️',
   desc:'Yo Mr. White! — Speed 2× brži',
   jCol:'#b89010',jCol2:'#d8b020',hair:'beanie',hCol:'#111',skin:'#d4b090',
   anxRate:1.0,bonus:'speed',streak:'none'},
];

// ── DRUGS ──────────────────────────────────────────────────
const DRUGS=[
  {id:'heroin',  name:'HEROIN', icon:'💉',col:'#c0392b',glo:'#ff5555',dur:9000, msg:'...sve usporava...',    hard:true},
  {id:'acid',    name:'ACID',   icon:'🔮',col:'#8e44ad',glo:'#dd44ff',dur:10000,msg:'REALNOST SE TOPI!!!',  hard:false},
  {id:'cocaine', name:'KOKAIN', icon:'❄️',col:'#2980b9',glo:'#88bbff',dur:7000, msg:'DUPLI SKOK! ULETI!',   hard:false},
  {id:'speed',   name:'SPEED',  icon:'⚡',col:'#d35400',glo:'#ff9900',dur:8000, msg:'⚡⚡ PUNI GAS ⚡⚡',    hard:false},
  {id:'weed',    name:'TRAVA',  icon:'🍃',col:'#27ae60',glo:'#44cc77',dur:12000,msg:'ahh... polako brate...',hard:false},
  {id:'ketamine',name:'KETAMIN',icon:'💊',col:'#0097a7',glo:'#00e5ff',dur:8000, msg:'K-HOLE... ko si ti?',  hard:true},
  {id:'crack',   name:'KREK',   icon:'🔥',col:'#8b0000',glo:'#ff5500',dur:3500, msg:'GORI!!! SVE GORI!!!',  hard:true},
  {id:'ecstasy', name:'ECSTASY',icon:'❤️',col:'#c0006a',glo:'#ff69b4',dur:11000,msg:'LJUBI SVE! MDMA!!!',   hard:false},
];

// ── AUDIO ──────────────────────────────────────────────────
let AC;
function ga(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function snd(f,d,v=0.2,t='sine'){try{const a=ga(),o=a.createOscillator(),g=a.createGain();o.type=t;o.frequency.setValueAtTime(f,a.currentTime);g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);}catch(e){}}
function sndMom(){[0,380,760].forEach(i=>setTimeout(()=>{snd(880,0.12,0.32,'square');setTimeout(()=>snd(660,0.09,0.2,'square'),140);},i));}
function sndSnort(){try{const a=ga(),buf=a.createBuffer(1,Math.floor(a.sampleRate*0.14),a.sampleRate),dt=buf.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=(Math.random()*2-1)*Math.pow(1-i/dt.length,3)*0.95;const src=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();src.buffer=buf;f.type='highpass';f.frequency.value=1500;g.gain.setValueAtTime(0.75,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.14);src.connect(f);f.connect(g);g.connect(a.destination);src.start();}catch(e){}}
function sndCrack(){try{const a=ga();for(let i=0;i<7;i++)setTimeout(()=>{const buf=a.createBuffer(1,Math.floor(a.sampleRate*0.028),a.sampleRate),d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,2)*0.9;const src=a.createBufferSource(),g=a.createGain();src.buffer=buf;g.gain.setValueAtTime(0.45,a.currentTime);src.connect(g);g.connect(a.destination);src.start();},i*48);setTimeout(()=>snd(1600,0.08,0.22,'square'),80);}catch(e){}}

// ── LEADERBOARD ────────────────────────────────────────────
let LB=[];
async function loadLB(){try{const r=await window.storage.get('ts_lb_v2');LB=r?JSON.parse(r.value):[];}catch(e){LB=[];}}
async function saveLB(score,charName,cause){
  LB.push({score:Math.floor(score),char:charName,cause,d:new Date().toLocaleDateString('sr')});
  LB.sort((a,b)=>b.score-a.score);LB=LB.slice(0,10);
  try{await window.storage.set('ts_lb_v2',JSON.stringify(LB));}catch(e){}
}
loadLB();

// ── STATE ──────────────────────────────────────────────────
const LANES=[-210,0,210];
let G={ph:'charselect',t:0,fr:0,hoverChar:-1,char:CHARS[0]};

function mkWagon(wz){const h=Math.floor(Math.random()*40);return{wz,col:`hsl(${5+h},${18+Math.random()*16}%,${13+Math.random()*13}%)`,colTop:`hsl(${5+h},${14+Math.random()*12}%,${24+Math.random()*8}%)`,num:String(3200+Math.floor(Math.random()*6800)),rust:Array.from({length:8},()=>({x:Math.random(),y:0.08+Math.random()*0.82,r:0.018+Math.random()*0.055,a:Math.random()*Math.PI})),grn:Math.random()>0.52,grfHue:120+Math.floor(Math.random()*60),logoCol:Math.random()>0.5?'#cc4400':'#224488'};}

function startGame(charId){
  const char=CHARS.find(c=>c.id===charId)||CHARS[0];
  const wags=[];for(let i=0;i<10;i++)wags.push(mkWagon(0.02+i*(W_LN+W_GAP)));
  G={ph:'play',t:0,fr:0,score:0,spd:0.008,hue:0,shk:0,msg:'',msgT:0,
     char,deathCause:'crash',wasOD:false,lastHard:'',streak:0,ovT:0,
     anxiety:0,
     mom:{active:false,timer:45000+Math.random()*20000,activeT:0},
     suvAlert:false,suvAlertT:0,
     p:{lane:1,wx:0,jy:0,jv:0,gnd:true,eff:null,effEnd:0,mj:1,ji:0},
     obs:[],pkp:[],parts:[],wags,obT:2400,pkT:2500};
  snd(400,0.15,0.25);
}

// ── INPUT ──────────────────────────────────────────────────
const KS={};
addEventListener('keydown',e=>{
  if(KS[e.code])return;KS[e.code]=true;
  if(G.ph==='overdose'||G.ph==='charselect')return;
  if(G.ph==='dead'){G.ph='charselect';G.hoverChar=-1;return;}
  if(G.ph!=='play')return;
  if(e.code==='ArrowLeft'||e.code==='KeyA'){mvL(-1);e.preventDefault();}
  if(e.code==='ArrowRight'||e.code==='KeyD'){mvL(1);e.preventDefault();}
  if(['Space','ArrowUp','KeyW'].includes(e.code)){doJump();e.preventDefault();}
});
addEventListener('keyup',e=>KS[e.code]=false);

CV.addEventListener('pointermove',e=>{
  if(G.ph!=='charselect')return;
  const r=CV.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  G.hoverChar=-1;
  CHARS.forEach((c,i)=>{const bx=charCardX(i);if(mx>=bx&&mx<=bx+cW&&my>=cY&&my<=cY+cH)G.hoverChar=i;});
});

CV.addEventListener('pointerdown',e=>{
  const r=CV.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  if(G.ph==='charselect'){
    CHARS.forEach((c,i)=>{const bx=charCardX(i);if(mx>=bx&&mx<=bx+cW&&my>=cY&&my<=cY+cH)startGame(c.id);});
    return;
  }
  if(G.ph==='overdose')return;
  if(G.ph==='dead'){G.ph='charselect';G.hoverChar=-1;return;}
  if(G.ph!=='play')return;
  const cx2=r.left+r.width/2;
  if(e.clientX<cx2-100)mvL(-1);else if(e.clientX>cx2+100)mvL(1);else doJump();
});

function mvL(d){const nl=Math.max(0,Math.min(2,G.p.lane+d));if(nl!==G.p.lane){G.p.lane=nl;snd(300+d*70,0.08,0.12);}}
function doJump(){const p=G.p;if(p.ji>=p.mj)return;p.jv=(p.eff==='heroin'||p.eff==='ketamine')?5:p.eff==='cocaine'?10:8;p.gnd=false;p.ji++;snd(280,0.12,0.18);}
function burst(x,y,col,n=12,f=5){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=(0.5+Math.random())*f;G.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,r:2+Math.random()*3,col,l:1,d:0.04+Math.random()*0.04});}}

// Card layout constants
const cW=162,cH=230,cGap=12;
function charCardX(i){return (W-CHARS.length*(cW+cGap)+cGap)/2+i*(cW+cGap);}
const cY=H/2-cH/2+15;

// ── UPDATE ─────────────────────────────────────────────────
function update(dt){
  const p=G.p,ch=G.char;
  G.t+=dt;G.fr++;G.score+=dt/60;
  G.spd=0.008+G.score*0.000055;
  const isH=p.eff==='heroin'||p.eff==='ketamine';
  let sp=G.spd;
  if(isH)sp*=0.5;
  if(p.eff==='speed')sp*=(ch.bonus==='speed'?2.1:1.55);
  if(p.eff==='weed')sp*=0.72;
  if(p.eff==='crack')sp*=2.6;
  if(p.eff==='ecstasy'){G.anxiety=Math.max(0,G.anxiety-6*dt/1000);}
  if(p.eff&&Date.now()>p.effEnd){p.eff=null;p.mj=1;}
  if(p.eff==='acid')G.hue=(G.hue+3)%360;
  if(G.shk>0)G.shk=Math.max(0,G.shk-dt*0.025);
  if(G.msgT>0)G.msgT-=dt;

  // ── ANXIETY ────
  if(p.eff){G.anxiety=Math.max(0,G.anxiety-3*dt/1000);}
  else{G.anxiety=Math.min(100,G.anxiety+ch.anxRate*(0.9+G.score*0.0015)*dt/1000*9);}
  if(G.anxiety>=75)G.shk=Math.max(G.shk,(G.anxiety-75)/25*7);
  if(G.anxiety>=100){G.deathCause='anxiety';die();return;}

  // ── MOM CALL ──
  const mc=G.mom;mc.timer-=dt;
  if(mc.timer<=0&&!mc.active){
    mc.active=true;mc.activeT=4500;mc.timer=42000+Math.random()*22000;
    G.suvAlert=true;G.suvAlertT=Math.max(G.suvAlertT,5500);
    sndMom();G.shk=Math.max(G.shk,6);
  }
  if(mc.active){mc.activeT-=dt;if(mc.activeT<=0)mc.active=false;}

  // ── SUV ALERT ──
  if(G.suvAlertT>0)G.suvAlertT-=dt;else G.suvAlert=false;

  p.wx+=(LANES[p.lane]-p.wx)*0.13;
  p.jv-=(isH?0.2:0.38);p.jy+=p.jv;
  if(p.jy<=0){p.jy=0;p.jv=0;p.gnd=true;p.ji=0;}
  const dz=sp*dt/16.67;
  G.obs.forEach(o=>o.wz-=dz);G.pkp.forEach(q=>q.wz-=dz);G.wags.forEach(w=>w.wz-=dz);
  for(const pt of G.parts){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.l-=pt.d;}
  G.obs=G.obs.filter(o=>o.wz>-0.06);G.pkp=G.pkp.filter(q=>q.wz>-0.06&&!q.done);
  G.parts=G.parts.filter(pt=>pt.l>0);G.wags=G.wags.filter(w=>w.wz+W_LN>-0.08);
  const last=G.wags[G.wags.length-1];
  if(!last||last.wz+W_LN<0.95)G.wags.push(mkWagon(last?last.wz+W_LN+W_GAP:0.5));
  G.obT-=dt;if(G.obT<=0){G.obs.push({lane:Math.floor(Math.random()*3),wz:1.0,tall:Math.random()>0.45});G.obT=2400+Math.random()*2800;}
  G.pkT-=dt;if(G.pkT<=0){G.pkp.push({lane:Math.floor(Math.random()*3),wz:1.0,drug:DRUGS[Math.floor(Math.random()*DRUGS.length)],done:false});G.pkT=3500+Math.random()*4000;}
  for(const o of G.obs){if(o.wz>0.14||o.wz<-0.01)continue;if(o.lane!==p.lane)continue;if(p.jy<(o.tall?65:30)*0.5){G.deathCause='crash';die();return;}}
  for(const q of G.pkp){
    if(q.done||q.wz>0.14||q.wz<-0.01)continue;if(q.lane!==p.lane)continue;
    q.done=true;const d=q.drug;
    let dur=d.dur;
    if(ch.bonus===d.id)dur*=2;
    p.eff=d.id;p.effEnd=Date.now()+dur;
    if(d.id==='cocaine')p.mj=2;
    // SUV alert on pickup
    G.suvAlert=true;G.suvAlertT=dur+2000;
    // Streak logic
    const immune=(ch.streak==='heroin_immune'&&d.id==='heroin')||(d.id===ch.bonus&&ch.id!=='amy');
    if(d.hard&&!immune){
      G.streak++;G.lastHard=d.name+' '+d.icon;
      if(G.streak>=3){setTimeout(triggerOD,300);return;}
      G.msg=G.streak===2?`⚠ JOŠ JEDNA ${d.icon} = OVERDOZA!`:`${d.icon}  ${d.name}  —  ${d.msg}`;
    }else{if(!d.hard)G.streak=0;G.msg=`${d.icon}  ${d.name}  —  ${d.msg}`;}
    G.msgT=3200;G.shk=10;
    const pp=prj(LANES[p.lane],0.1);burst(pp.x,NY-40,d.glo,20,6);
    // Zvuk udisanja/povlačenja — specifičan za svaku drogu
    const snortDrugs=['heroin','cocaine','ketamine','speed'];
    if(snortDrugs.includes(d.id)){sndSnort();}
    else if(d.id==='crack'){sndCrack();}
    else if(d.id==='ecstasy'){snd(220,0.1,0.15);} // gutanje
    setTimeout(()=>({
      heroin:   ()=>snd(80,0.9,0.3),
      acid:     ()=>{snd(440,0.3,0.2);snd(554,0.45,0.15);},
      cocaine:  ()=>{snd(900,0.08,0.4,'square');snd(1300,0.12,0.25);},
      speed:    ()=>snd(650,0.18,0.32,'sawtooth'),
      weed:     ()=>snd(180,1.2,0.22),
      ketamine: ()=>{snd(110,1.4,0.28);snd(82,2.0,0.18);},
      crack:    ()=>snd(1400,0.18,0.28,'square'),
      ecstasy:  ()=>{snd(660,0.5,0.18);snd(880,0.7,0.14);snd(1100,0.9,0.1);}
    }[d.id])?.(), snortDrugs.includes(d.id)?135:d.id==='crack'?0:80);
  }
}
async function die(){G.ph='dead';await saveLB(G.score,G.char.name,G.deathCause);snd(220,0.7,0.3,'sawtooth');}
function triggerOD(){
  if(G.ph!=='play')return;
  G.ph='overdose';G.ovT=0;G.wasOD=true;G.deathCause='overdoza';
  saveLB(G.score,G.char.name,'overdoza');
  snd(58,0.35,0.4);setTimeout(()=>snd(52,0.45,0.34),550);
  setTimeout(()=>snd(44,0.7,0.26),1200);setTimeout(()=>snd(36,1.4,0.16),2100);
  setTimeout(()=>snd(820,4.5,0.055),3400);
}

// ── HELPERS ────────────────────────────────────────────────
function rr(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();}
function wrapTxt(text,x,y,mw,lh){const wds=text.split(' ');let l='',ly=y;for(const w of wds){const t=l+w+' ';if(cx.measureText(t).width>mw&&l!==''){cx.fillText(l.trim(),x,ly);l=w+' ';ly+=lh;}else l=t;}cx.fillText(l.trim(),x,ly);}

// ── BG CACHE ───────────────────────────────────────────────
let BG=null;
function getBG(){
  if(BG)return BG;BG=document.createElement('canvas');BG.width=W;BG.height=H;
  const bx=BG.getContext('2d');
  const sg=bx.createLinearGradient(0,0,0,VY);sg.addColorStop(0,'#030310');sg.addColorStop(1,'#080820');
  bx.fillStyle=sg;bx.fillRect(0,0,W,VY);
  bx.fillStyle='rgba(255,255,255,0.8)';for(let i=0;i<110;i++)bx.fillRect(Math.random()*W,Math.random()*VY,Math.random()<0.1?2:1,1);
  bx.fillStyle='#ccc870';bx.beginPath();bx.arc(700,40,18,0,Math.PI*2);bx.fill();
  bx.fillStyle='#030310';bx.beginPath();bx.arc(708,35,14,0,Math.PI*2);bx.fill();
  const bl=[[0,52],[62,82],[128,60],[195,98],[258,66],[318,86],[378,50],[445,72],[500,56],[558,90],[618,68],[672,54],[728,80],[778,60],[800,70]];
  bx.fillStyle='#07071a';bx.beginPath();bx.moveTo(0,VY);
  for(let i=0;i<bl.length-1;i++){bx.lineTo(bl[i][0],VY-bl[i][1]);bx.lineTo(bl[i+1][0]-1,VY-bl[i][1]);}
  bx.lineTo(W,VY);bx.closePath();bx.fill();
  bx.fillStyle='rgba(255,200,50,0.1)';for(let i=0;i<55;i++)bx.fillRect(Math.random()*W,Math.random()*VY*0.88,3,4);
  return BG;
}

// ── WAGON ──────────────────────────────────────────────────
function drawWagonFace(w){
  const wz0=w.wz,wz1=w.wz+W_LN;
  if(wz1<=0.015||wz0>=1.0)return;
  const wza=Math.max(0.02,wz0),wzb=Math.min(0.98,wz1);
  const pA=prj(W_WX,wza),pB=prj(W_WX,wzb);
  const hA=W_HT*pA.s,hB=W_HT*pB.s,xA=pA.x,yBA=pA.y,yTA=pA.y-hA,xB=pB.x,yBB=pB.y,yTB=pB.y-hB;
  if(xA>W/2-30)return;
  const alpha=Math.min(1,(wza-0.015)/0.04)*Math.min(1,(0.98-wzb)/0.04);
  if(alpha<=0.01)return;
  cx.globalAlpha=alpha;
  function wp(th,tv){const x=xA+(xB-xA)*th,yT=yTA+(yTB-yTA)*th,yB=yBA+(yBB-yBA)*th;return{x,y:yT+(yB-yT)*tv};}
  function quad(c0,c1,c2,c3,sty){cx.beginPath();cx.moveTo(c0.x,c0.y);cx.lineTo(c1.x,c1.y);cx.lineTo(c2.x,c2.y);cx.lineTo(c3.x,c3.y);cx.closePath();cx.fillStyle=sty;cx.fill();}
  function ql(p1,p2,sty,lw){cx.strokeStyle=sty;cx.lineWidth=lw;cx.beginPath();cx.moveTo(p1.x,p1.y);cx.lineTo(p2.x,p2.y);cx.stroke();}
  const sc=pA.s,tl=wp(0,0),tr=wp(1,0),br=wp(1,1),bl=wp(0,1);
  quad(tl,tr,br,bl,w.col);
  const vg=cx.createLinearGradient(xA,yTA,xA,yBA);vg.addColorStop(0,'rgba(255,255,255,0.15)');vg.addColorStop(0.18,'rgba(255,255,255,0.04)');vg.addColorStop(0.72,'rgba(0,0,0,0.06)');vg.addColorStop(1,'rgba(0,0,0,0.55)');quad(tl,tr,br,bl,vg);
  if(sc>0.38){const lH=10*sc,lt2={x:tl.x,y:tl.y-lH},rt2={x:tr.x,y:tr.y-lH*0.6};quad(lt2,rt2,tr,tl,w.colTop);ql(lt2,rt2,'rgba(0,0,0,0.5)',Math.max(0.5,1.5*sc));}
  quad(tl,tr,wp(1,0.04),wp(0,0.04),'rgba(255,255,255,0.14)');
  [0.34,0.67].forEach(tv=>{quad(wp(0,tv-0.022),wp(1,tv-0.022),wp(1,tv+0.022),wp(0,tv+0.022),'rgba(0,0,0,0.38)');quad(wp(0,tv+0.022),wp(1,tv+0.022),wp(1,tv+0.06),wp(0,tv+0.06),'rgba(0,0,0,0.18)');ql(wp(0,tv-0.026),wp(1,tv-0.026),'rgba(255,255,255,0.12)',Math.max(0.5,1.2*sc));});

  if(e==='heroin'){const vg=cx.createRadialGradient(W/2,H/2,H*0.18,W/2,H/2,H*0.9);vg.addColorStop(0,'rgba(50,15,0,0)');vg.addColorStop(1,'rgba(60,18,0,0.8)');cx.fillStyle=vg;cx.fillRect(0,0,W,H);}
  if(e==='acid'){for(let y=0;y<H;y+=40){cx.strokeStyle=`hsla(${(G.hue+y*1.4)%360},82%,62%,0.065)`;cx.lineWidth=28;cx.beginPath();cx.moveTo(0,y);for(let x=0;x<=W;x+=7)cx.lineTo(x,y+Math.sin(x/22+G.t/280)*8);cx.stroke();}cx.fillStyle=`rgba(140,0,210,${0.05+Math.sin(G.t/450)*0.04})`;cx.fillRect(0,0,W,H);}
  if(e==='cocaine'){if(G.fr%48<5){cx.fillStyle=`rgba(255,255,255,${0.14*(5-G.fr%48)/5})`;cx.fillRect(0,0,W,H);}const vg=cx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.75);vg.addColorStop(0,'rgba(130,180,255,0)');vg.addColorStop(1,'rgba(130,180,255,0.1)');cx.fillStyle=vg;cx.fillRect(0,0,W,H);}
  if(e==='speed'){cx.strokeStyle='rgba(255,120,20,0.1)';for(let i=0;i<14;i++){const sy=30+Math.random()*(H-60);cx.lineWidth=1+Math.random()*2.5;cx.beginPath();cx.moveTo(0,sy);cx.lineTo(60+Math.random()*200,sy);cx.stroke();}}
  if(e==='weed'){cx.fillStyle='rgba(7,40,7,0.2)';cx.fillRect(0,0,W,H);}
  if(e==='ketamine'){const vg=cx.createRadialGradient(W/2,H*0.52,H*0.1,W/2,H*0.52,H*0.78);vg.addColorStop(0,'rgba(0,140,165,0)');vg.addColorStop(0.55,'rgba(0,5,20,0.1)');vg.addColorStop(1,'rgba(0,0,25,0.9)');cx.fillStyle=vg;cx.fillRect(0,0,W,H);cx.strokeStyle='rgba(0,200,225,0.04)';cx.lineWidth=20;for(let y=0;y<H;y+=52){cx.beginPath();cx.moveTo(0,y);for(let x=0;x<=W;x+=8)cx.lineTo(x,y+Math.sin(x/35+G.t/500)*4);cx.stroke();}}
}

// ── ANXIETY OVERLAY ────────────────────────────────────────
function drawAnxietyFX(){
  const pct=G.anxiety/100;if(pct<0.45)return;
  const a=(pct-0.45)/0.55;
  const vg=cx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
  vg.addColorStop(0,'rgba(120,0,0,0)');vg.addColorStop(1,`rgba(120,0,0,${a*0.6})`);
  cx.fillStyle=vg;cx.fillRect(0,0,W,H);
  if(pct>0.85&&G.fr%20<10){cx.font='bold 22px Courier New';cx.textAlign='center';cx.fillStyle=`rgba(255,80,80,${(pct-0.85)/0.15})`;cx.fillText('😰 NAPADAJ PANIKE!',W/2,H*0.15);cx.textAlign='left';}
}

// ── MOM CALL NOTIFICATION ──────────────────────────────────
function drawMomCall(){
  const mc=G.mom;if(!mc.active)return;
  const a=Math.min(1,mc.activeT/400)*Math.min(1,(4500-mc.activeT)/300+0.3);
  cx.globalAlpha=Math.max(0,a);
  cx.fillStyle='rgba(20,20,20,0.95)';rr(W/2-195,14,390,60,10);cx.fill();
  cx.strokeStyle='rgba(255,100,100,0.4)';cx.lineWidth=1.5;rr(W/2-195,14,390,60,10);cx.stroke();
  cx.font='28px serif';cx.textAlign='left';cx.fillText('📱',W/2-174,58);
  cx.fillStyle='#ff8888';cx.font='bold 10px Courier New';cx.fillText('MAMA · ZOVE',W/2-138,30);
  cx.fillStyle='#eee';cx.font='13px Courier New';cx.fillText('"Sine, gde si sakrio moje ZLATO?!"',W/2-138,50);
  if(G.fr%10<5){cx.fillStyle='rgba(255,0,0,0.06)';cx.fillRect(0,0,W,H);}
  cx.globalAlpha=1;cx.textAlign='left';
}

// ── OVERDOZA SCREEN ────────────────────────────────────────
function drawOverdose(){
  const t=G.ovT,prog=Math.min(1,t/5600);
  const hbP=Math.max(250,700-prog*600),beat=prog<0.65?Math.pow(Math.max(0,Math.sin((t%hbP)/hbP*Math.PI*2)),18)*0.48:0;
  const vr=cx.createRadialGradient(W/2,H/2,H*(0.3-prog*0.26),W/2,H/2,H*0.92);
  vr.addColorStop(0,'rgba(0,0,0,0)');vr.addColorStop(1,`rgba(110,0,0,${0.3+prog*0.65+beat*0.28})`);
  cx.fillStyle=vr;cx.fillRect(0,0,W,H);
  if(beat>0.08){cx.fillStyle=`rgba(255,255,255,${beat*0.2})`;cx.fillRect(0,0,W,H);}
  if(t>350&&t<4000){cx.save();cx.globalAlpha=Math.min(1,(t-350)/300)*0.88;cx.strokeStyle='#22dd44';cx.lineWidth=2;const lx=55,ly=H*0.77,lw=W-110;cx.beginPath();cx.moveTo(lx,ly);const nb=Math.min(5,Math.floor((t-350)/620));let cx2=lx;for(let i=0;i<nb;i++){const seg=lw/6;cx.lineTo(cx2+seg*0.24,ly);cx.lineTo(cx2+seg*0.31,ly-38);cx.lineTo(cx2+seg*0.38,ly+22);cx.lineTo(cx2+seg*0.44,ly);cx2+=seg;}if(t>2900){cx.lineTo(lx+lw,ly);cx.strokeStyle='#22dd44';}else cx.lineTo(cx2,ly);cx.stroke();if(t>2900){cx.fillStyle='#22dd44';cx.font='10px Courier New';cx.textAlign='right';cx.fillText('FLATLINE ──────',W-58,H*0.77-10);cx.textAlign='left';}cx.restore();}
  if(t>500){const ta=Math.min(1,(t-500)/550);cx.globalAlpha=ta;cx.textAlign='center';cx.shadowColor='#ff0000';cx.shadowBlur=55;cx.fillStyle='#fff';cx.font=`bold ${Math.min(68,38+prog*32)}px Courier New`;cx.fillText('OVERDOZA',W/2,H*0.22);cx.shadowBlur=0;cx.globalAlpha=1;}
  if(t>950&&G.lastHard){cx.globalAlpha=Math.min(1,(t-950)/420);cx.textAlign='center';cx.fillStyle='#ff9999';cx.font='14px Courier New';cx.fillText(`${G.char.emoji} ${G.char.name} — ${G.lastHard} × 3 zaredom`,W/2,H*0.32);cx.globalAlpha=1;}
  const info=[{at:1400,txt:'⚠  HEROIN i KETAMIN zaustavljaju disanje i srce',c:'#ffaaaa'},{at:2000,txt:'Predoziranje — smrt nastupa za nekoliko minuta',c:'#ffcc99'},{at:2600,txt:'📞  ODMAH ZOVI 112 — ne čekaj, svaka sekunda je važna',c:'#ffff88'},{at:3200,txt:'💊  Nalokson (Narcan) poništava efekte opijata',c:'#aaffcc'},{at:3900,txt:'Postavi osobu u bočni položaj — sprečava gušenje',c:'#aaccff'}];
  info.forEach((inf,i)=>{if(t<inf.at)return;const ia=Math.min(1,(t-inf.at)/450);cx.globalAlpha=ia*0.92;const iy=H*0.42+i*32;cx.fillStyle='rgba(0,0,0,0.58)';cx.fillRect(W*0.04,iy-16,W*0.92,24);cx.fillStyle=inf.c;cx.font='12px Courier New';cx.textAlign='center';cx.fillText(inf.txt,W/2,iy);cx.globalAlpha=1;});
  if(prog>0.9){cx.fillStyle=`rgba(0,0,0,${(prog-0.9)/0.1})`;cx.fillRect(0,0,W,H);}cx.textAlign='left';
}

// ── HUD ────────────────────────────────────────────────────
function drawHUD(){
  const p=G.p,ch=G.char,pct=G.anxiety/100;
  cx.font='bold 20px Courier New';cx.textAlign='right';cx.fillStyle='#fff';cx.fillText(String(Math.floor(G.score)).padStart(5,'0'),W-14,32);
  cx.font='10px Courier New';cx.fillStyle='#444';cx.fillText(`HI ${LB.length>0?LB[0].score:0}`,W-14,46);
  // Anxiety bar
  const bW=120,bH=10,bX=W-14-bW,bY2=56;
  cx.fillStyle='rgba(0,0,0,0.55)';rr(bX-2,bY2-2,bW+4,bH+4,4);cx.fill();
  const anxCol=pct<0.5?'#27ae60':pct<0.75?'#f39c12':'#e74c3c';
  cx.fillStyle=anxCol;rr(bX,bY2,bW*pct,bH,3);cx.fill();
  if(pct>0.75&&G.fr%24<12)cx.fillStyle=`rgba(255,60,60,${(pct-0.75)/0.25*0.35})`,cx.fillRect(0,0,W,H);
  cx.fillStyle='#444';cx.font='8px Courier New';cx.textAlign='right';cx.fillText('😰 ANKSIOZNOST',W-14,bY2-3);
  // Streak icons
  if(G.streak>0){cx.font='14px serif';cx.textAlign='right';cx.fillText('💉'.repeat(G.streak),W-14,80);if(G.streak===2){cx.fillStyle='#ff4444';cx.font='bold 8px Courier New';cx.fillText('⚠ JOŠ JEDNA = OVERDOZA',W-14,92);}}
  // Drug bar
  if(p.eff){const d=DRUGS.find(d=>d.id===p.eff),rem=Math.max(0,p.effEnd-Date.now()),frac=rem/d.dur;cx.fillStyle='rgba(0,0,0,0.7)';rr(10,10,218,58,8);cx.fill();cx.fillStyle=d.col+'cc';rr(12,36,214*frac,17,4);cx.fill();cx.fillStyle='#fff';cx.font='bold 14px Courier New';cx.textAlign='left';cx.fillText(`${d.icon}  ${d.name}`,16,30);cx.fillStyle=d.glo;cx.font='9px Courier New';cx.fillText(d.msg,16,52);if(rem<2000&&G.fr%18<9){cx.fillStyle='rgba(255,30,30,0.25)';rr(10,10,218,58,8);cx.fill();}}
  // Lane dots
  [0,1,2].forEach(i=>{cx.fillStyle=i===p.lane?'#fff':'#2a2a2a';cx.beginPath();cx.arc(W/2+(i-1)*28,H-14,i===p.lane?5:3.5,0,Math.PI*2);cx.fill();});
  // Char indicator
  cx.textAlign='left';cx.fillStyle='#333';cx.font='10px Courier New';cx.fillText(`${ch.emoji} ${ch.name}`,14,H-10);
  if(G.score<10){cx.fillStyle='rgba(255,255,255,0.2)';cx.font='10px Courier New';cx.textAlign='center';cx.fillText('← → menjaj traku   SPACE skok',W/2,H-24);}
  if(G.msgT>0&&G.ph==='play'){cx.globalAlpha=Math.min(1,G.msgT/500);cx.font='bold 22px Courier New';cx.textAlign='center';cx.fillStyle=G.streak===2?'#ff6666':'#fff';cx.shadowColor='#000';cx.shadowBlur=18;cx.fillText(G.msg,W/2,H*0.33);cx.shadowBlur=0;cx.globalAlpha=1;}
  cx.textAlign='left';
}

// ── CHAR SELECT ────────────────────────────────────────────
function drawMiniChar(x,y,ch,sc2=1){
  const s=sc2;
  cx.fillStyle=ch.jCol;cx.fillRect(x-12*s,y-26*s,24*s,26*s);
  cx.fillStyle=ch.skin;cx.beginPath();cx.ellipse(x,y-36*s,7*s,9*s,0,0,Math.PI*2);cx.fill();
  cx.fillStyle=ch.hCol;
  if(ch.hair==='beehive'){cx.beginPath();cx.ellipse(x,y-52*s,6*s,14*s,0,0,Math.PI*2);cx.fill();}
  else if(ch.hair==='beanie'){cx.fillRect(x-9*s,y-50*s,18*s,13*s);}
  else if(ch.hair==='curly'){for(let i=0;i<4;i++){cx.beginPath();cx.arc(x-6*s+i*4*s,y-46*s,4*s,0,Math.PI*2);cx.fill();}}
  else{cx.fillRect(x-8*s,y-47*s,16*s,11*s);}
  cx.fillStyle='#1e3a72';cx.fillRect(x-8*s,y,6*s,16*s);cx.fillRect(x+2*s,y,6*s,16*s);
}

function drawCharSelect(){
  cx.fillStyle='rgba(0,0,0,0.95)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.fillStyle='#c0392b';cx.font='bold 28px Courier New';cx.shadowColor='#c0392b';cx.shadowBlur=18;cx.fillText('IZABERI LIKA',W/2,44);cx.shadowBlur=0;
  cx.fillStyle='#333';cx.font='9px Courier New';cx.fillText('Svaki lik ima drugačiji efekat na anksioznost i drogu',W/2,58);
  CHARS.forEach((ch,i)=>{
    const bx=charCardX(i),by=cY,hover=G.hoverChar===i;
    cx.fillStyle=hover?'#161616':'#0d0d0d';rr(bx,by,cW,cH,8);cx.fill();
    cx.strokeStyle=hover?ch.jCol2:'#1e1e1e';cx.lineWidth=hover?2:1;rr(bx,by,cW,cH,8);cx.stroke();
    if(hover){cx.strokeStyle=ch.jCol2;cx.lineWidth=3;cx.shadowColor=ch.jCol2;cx.shadowBlur=12;rr(bx,by,cW,cH,8);cx.stroke();cx.shadowBlur=0;}
    // Emoji
    cx.font='30px serif';cx.fillText(ch.emoji,bx+cW/2,by+42);
    // Mini character
    drawMiniChar(bx+cW/2,by+105,ch,1.18);
    // Name
    cx.fillStyle='#fff';cx.font='bold 11px Courier New';cx.fillText(ch.name,bx+cW/2,by+148);
    // Desc
    cx.fillStyle='#555';cx.font='9px Courier New';wrapTxt(ch.desc,bx+cW/2,by+162,cW-18,13);
    // Anxiety bar label
    cx.fillStyle='#333';cx.font='8px Courier New';cx.textAlign='left';cx.fillText('😰',bx+12,by+cH-26);cx.textAlign='center';
    const bW2=cW-38,bX2=bx+28;
    cx.fillStyle='#1a1a1a';cx.fillRect(bX2,by+cH-34,bW2,7);
    const anxPct=Math.min(1,ch.anxRate/1.4);
    const anxC=anxPct<0.6?'#27ae60':anxPct<0.85?'#f39c12':'#e74c3c';
    cx.fillStyle=anxC;cx.fillRect(bX2,by+cH-34,bW2*anxPct,7);
    // Click hint
    if(hover){cx.fillStyle=ch.jCol2;cx.font='bold 9px Courier New';cx.fillText('▶ IZABERI',bx+cW/2,by+cH-10);}
  });
  cx.fillStyle='#222';cx.font='10px Courier New';cx.fillText('Klikni na lika da počneš igru',W/2,H-16);
  cx.textAlign='left';
}

// ── DEAD SCREEN + LEADERBOARD ──────────────────────────────
function drawDead(){
  cx.fillStyle='rgba(0,0,0,0.88)';cx.fillRect(0,0,W,H);cx.textAlign='center';
  const titles={crash:'UHVAĆEN!',overdoza:'OVERDOZA',anxiety:'NAPADAJ PANIKE!'};
  const colors={crash:'#e74c3c',overdoza:'#ff2222',anxiety:'#ff8c00'};
  cx.fillStyle=colors[G.deathCause]||'#e74c3c';cx.font=`bold ${G.wasOD?42:50}px Courier New`;cx.shadowColor=colors[G.deathCause];cx.shadowBlur=25;cx.fillText(titles[G.deathCause]||'UHVAĆEN!',W/2,H*0.14);cx.shadowBlur=0;
  if(G.deathCause==='anxiety')cx.fillStyle='#ffaa77',cx.font='11px Courier New',cx.fillText(`${G.char.emoji} ${G.char.name} nije mogao da podnese anksioznost bez droge`,W/2,H*0.2);
  if(G.wasOD)cx.fillStyle='#ffaaaa',cx.font='11px Courier New',cx.fillText('Heroin/Ketamin blokira disanje — pozovi 112 · Nalokson spašava živote',W/2,H*0.2);
  cx.fillStyle='#f1c40f';cx.font='bold 15px Courier New';cx.fillText(`${G.char.emoji}  ${G.char.name}  —  ${Math.floor(G.score)} bodova`,W/2,H*0.27);
  // LEADERBOARD
  if(LB.length>0){
    cx.fillStyle='#1e1e1e';rr(W/2-210,H*0.32,420,H*0.55,6);cx.fill();cx.strokeStyle='#2a2a2a';cx.lineWidth=1;rr(W/2-210,H*0.32,420,H*0.55,6);cx.stroke();
    cx.fillStyle='#333';cx.font='bold 9px Courier New';cx.fillText('── TOP 10 LESTVICA ──',W/2,H*0.32+16);
    const medals=['🥇','🥈','🥉'];
    const causeIco={crash:'🚧',overdoza:'💉',anxiety:'😰'};
    LB.forEach((e,i)=>{
      const ry=H*0.32+30+i*22;
      const isMe=e.score===Math.floor(G.score)&&e.char===G.char.name;
      if(isMe){cx.fillStyle='rgba(241,196,15,0.08)';cx.fillRect(W/2-208,ry-13,416,20);}
      cx.fillStyle=isMe?'#f1c40f':i<3?'#fff':i<6?'#888':'#444';
      cx.font=`${isMe?'bold ':''} 11px Courier New`;
      const medal=medals[i]||`${i+1}.`;
      cx.fillText(`${medal}  ${e.char}  ${e.score}  ${causeIco[e.cause]||''}  ${e.d||''}`,W/2,ry);
    });
  } else {
    cx.fillStyle='#333';cx.font='12px Courier New';cx.fillText('Nema još rezultata — ti si prvi!',W/2,H*0.5);
  }
  if(Math.floor(G.t/600)%2===0){cx.fillStyle='#555';cx.font='11px Courier New';cx.fillText('[ SPACE / KLIK — nazad na odabir lika ]',W/2,H*0.92);}
  cx.textAlign='left';
}

// ── RENDER ─────────────────────────────────────────────────
function render(){
  cx.clearRect(0,0,W,H);
  if(G.ph==='charselect'){drawCharSelect();return;}
  cx.save();
  if(G.shk>0)cx.translate((Math.random()-0.5)*G.shk*2,(Math.random()-0.5)*G.shk);
  if(G.p&&G.p.eff==='acid')cx.filter=`hue-rotate(${G.hue}deg) saturate(2.5) brightness(1.06)`;
  if(G.ph==='play'||G.ph==='dead'||G.ph==='overdose'){
    drawScene();drawSUV();
    if(G.obs&&G.pkp){
      [...G.obs.map(o=>({...o,_:'o'})),...G.pkp.filter(q=>!q.done).map(q=>({...q,_:'p'}))]
        .sort((a,b)=>b.wz-a.wz).forEach(obj=>obj._==='o'?drawObs(obj):drawPickup(obj));
    }
    drawPlayer();drawFX();drawAnxietyFX();
    for(const pt of G.parts){cx.globalAlpha=Math.max(0,pt.l);cx.fillStyle=pt.col;cx.beginPath();cx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);cx.fill();}
    cx.globalAlpha=1;
  }
  cx.filter='none';cx.restore();
  if(G.ph==='play'){drawHUD();drawMomCall();}
  if(G.ph==='overdose'){drawOverdose();drawHUD();}
  if(G.ph==='dead')drawDead();
}

// ── LOOP ───────────────────────────────────────────────────
let prevT=0;
function loop(ts){
  requestAnimationFrame(loop);const dt=Math.min(ts-prevT,50);prevT=ts;
  G.t+=dt;G.fr++;
  if(G.ph==='play')update(dt);
  else if(G.ph==='overdose'){G.ovT+=dt;if(G.ovT>6200)G.ph='dead';}
  render();
}
requestAnimationFrame(loop);
</script></body></html>
